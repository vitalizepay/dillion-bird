name: IndexNow Ping
on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow (Bing, Yandex, Naver, Seznam)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @- <<EOF
          {
            "host": "dillonbird.com",
            "key": "$INDEXNOW_KEY",
            "keyLocation": "https://dillonbird.com/$INDEXNOW_KEY.txt",
            "urlList": [
              "https://dillonbird.com/",
              "https://dillonbird.com/about",
              "https://dillonbird.com/blog",
              "https://dillonbird.com/contact"
            ]
          }
          EOF
